<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

    <div class="checkout-container">

        <h1>Checkout</h1>

        <form method="POST">

            <input
                type="text"
                name="customer_name"
                placeholder="Your Name"
                required
            >

            <input
                type="text"
                name="phone"
                placeholder="Phone Number"
                required
            >

            <textarea
                name="address"
                placeholder="Your Address"
                required
            ></textarea>

            <button type="submit">

                Place Order

            </button>

        </form>

    </div>

</body>
</html>
